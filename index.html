<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta rel="icon" href="data:image/x-icon;base64,AAABAAEAEBAQAAEABACoBAAA">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Pro Ticker Analyzer</title>
<style>
:root {
  --bg: #080b0f;
  --bg2: #0d1117;
  --bg3: #161b22;
  --bg4: #1c2128;
  --border: #21262d;
  --border2: #30363d;
  --text: #e6edf3;
  --text2: #c9d1d9;
  --text3: #8b949e;
  --text4: #6e7681;
  --green: #1D9E75;
  --green2: #0f6e56;
  --green-bg: #1a3a2e;
  --green-border: #2d6a50;
  --red: #e24b4a;
  --red-bg: #2d1b1b;
  --red-border: #6b2c2c;
  --amber: #EF9F27;
  --amber-bg: #2d1f0a;
  --amber-border: #854F0B;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', 'Segoe UI', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(29,158,117,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(29,158,117,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  pointer-events: none;
  z-index: 0;
}
.orb1 { width: 600px; height: 600px; background: rgba(29,158,117,0.06); top: -200px; right: -200px; }
.orb2 { width: 400px; height: 400px; background: rgba(201,162,39,0.04); bottom: -100px; left: -100px; }

.wrap {
  position: relative;
  z-index: 1;
  max-width: 900px;
  margin: 0 auto;
  padding: 0 20px 60px;
}

header {
  padding: 40px 0 32px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  margin-bottom: 36px;
}

.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--green), var(--green2));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.logo-text h1 { font-size: 20px; font-weight: 800; color: var(--text); }
.logo-text p { font-size: 11px; color: var(--text4); margin-top: 2px; }

.input-section { display: grid; grid-template-columns: 1fr; gap: 16px; margin-bottom: 20px; }
.input-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
}
.input-card-label { font-size: 9px; color: var(--text4); margin-bottom: 12px; }
textarea {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  font-family: monospace;
  font-size: 12px;
  color: var(--text);
  height: 100px;
  resize: none;
}

.analyze-btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--green), var(--green2));
  border: none;
  border-radius: 12px;
  color: #fff;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 32px;
}
.analyze-btn:hover { transform: translateY(-1px); }
.analyze-btn:disabled { background: var(--bg4); cursor: not-allowed; }

.result-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  animation: fadeUp 0.3s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1} }

.result-hero {
  padding: 24px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}

.result-ticker { font-size: 42px; font-weight: 800; color: var(--text); }
.result-company { font-size: 13px; color: var(--text3); margin-top: 4px; }

.result-body { padding: 24px; }

.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 20px;
}

.stat-cell {
  background: var(--bg2);
  padding: 10px 12px;
}

.stat-k { font-size: 9px; color: var(--text4); }
.stat-v { font-size: 13px; font-weight: 700; color: var(--text); margin-top: 2px; }

.verdict-section { margin-bottom: 20px; }
.verdict-pill {
  display: inline-block;
  padding: 8px 16px;
  border-radius: 20px;
  font-weight: 700;
  margin-bottom: 10px;
}
.v-long { background: var(--green-bg); color: var(--green); }
.v-short { background: var(--red-bg); color: var(--red); }

.confidence-bar {
  height: 4px;
  border-radius: 2px;
  background: var(--bg4);
  overflow: hidden;
  margin-bottom: 10px;
}

.conf-fill { height: 100%; border-radius: 2px; }
.cf-high { background: var(--green); }
.cf-med { background: var(--amber); }
.cf-low { background: var(--red); }

.news-section { border-top: 1px solid var(--border); padding-top: 20px; }
.news-item {
  padding: 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 10px;
  font-size: 13px;
  line-height: 1.5;
}

.error-card {
  background: var(--red-bg);
  border: 1px solid var(--red-border);
  border-radius: 16px;
  padding: 20px;
  color: var(--red);
  font-family: monospace;
}

.loading-card {
  text-align: center;
  padding: 48px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 2px solid var(--border2);
  border-top-color: var(--green);
  border-radius: 50%;
  margin: 0 auto 16px;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 640px) {
  .result-ticker { font-size: 32px; }
}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="wrap">
  <header>
    <div class="logo">
      <div class="logo-icon">📈</div>
      <div class="logo-text">
        <h1>Pro Ticker Analyzer</h1>
        <p>AI-POWERED SIGNAL INTELLIGENCE</p>
      </div>
    </div>
  </header>

  <div class="input-section">
    <div class="input-card">
      <div class="input-card-label">📊 Enter Ticker Symbol</div>
      <textarea id="signalInput" placeholder="Enter ticker: NVDA, AAPL, TSLA, etc."></textarea>
    </div>
  </div>

  <button class="analyze-btn" id="analyzeBtn">Analyze Signal →</button>
  <div id="result"></div>
</div>

<script>
const WORKER_URL = 'https://morning-haze-6f7c.parmindarmundra.workers.dev';

async function fhFetch(path) {
  try {
    const url = WORKER_URL + '/finnhub?path=' + encodeURIComponent(path);
    const r = await fetch(url);
    if (!r.ok) {
      console.error('Fetch error:', r.status, r.statusText);
      return null;
    }
    return r.json();
  } catch(e) {
    console.error('Fetch error:', e.message);
    return null;
  }
}

function fmt(n, d) { return n ? Number(n).toFixed(d || 2) : '—'; }

async function getFinnhubData(ticker) {
  const from = new Date(Date.now() - 3*86400000).toISOString().split('T')[0];
  const to = new Date().toISOString().split('T')[0];
  
  const [q, p, f, n] = await Promise.all([
    fhFetch('/quote?symbol=' + ticker),
    fhFetch('/stock/profile2?symbol=' + ticker),
    fhFetch('/stock/metric?symbol=' + ticker + '&metric=all'),
    fhFetch('/company-news?symbol=' + ticker + '&from=' + from + '&to=' + to)
  ]);

  return { q, p, f: f?.metric || {}, n: n?.data || [] };
}

document.getElementById('analyzeBtn').addEventListener('click', async function() {
  const input = document.getElementById('signalInput').value.trim().toUpperCase();
  if (!input) {
    alert('Please enter a ticker');
    return;
  }

  const ticker = input.match(/[A-Z]{1,5}/)?.[0];
  if (!ticker) {
    alert('Invalid ticker');
    return;
  }

  document.getElementById('result').innerHTML = '<div class="loading-card"><div class="spinner"></div><div>Loading ' + ticker + '...</div></div>';

  const data = await getFinnhubData(ticker);
  if (!data.q || data.q.c === 0) {
    document.getElementById('result').innerHTML = '<div class="error-card">Unable to load ' + ticker + '. Check ticker symbol.</div>';
    return;
  }

  const q = data.q;
  const p = data.p || {};
  const f = data.f || {};
  const change = q.c && q.pc ? ((q.c - q.pc) / q.pc * 100) : 0;

  let html = `
    <div class="result-card">
      <div class="result-hero">
        <div>
          <div class="result-ticker">${ticker}</div>
          <div class="result-company">${p.name || 'Unknown'}</div>
        </div>
      </div>
      <div class="result-body">
        <div class="stats-grid">
          <div class="stat-cell"><div class="stat-k">PRICE</div><div class="stat-v">$${fmt(q.c)}</div></div>
          <div class="stat-cell"><div class="stat-k">CHANGE</div><div class="stat-v" style="color: ${change > 0 ? 'var(--green)' : 'var(--red)'}">${change > 0 ? '+' : ''}${fmt(change)}%</div></div>
          <div class="stat-cell"><div class="stat-k">HIGH</div><div class="stat-v">$${fmt(q.h)}</div></div>
          <div class="stat-cell"><div class="stat-k">LOW</div><div class="stat-v">$${fmt(q.l)}</div></div>
          <div class="stat-cell"><div class="stat-k">VOLUME</div><div class="stat-v">${(q.v / 1e6).toFixed(1)}M</div></div>
          <div class="stat-cell"><div class="stat-k">MARKET CAP</div><div class="stat-v">$${fmt(p.marketCapitalization / 1e9)}B</div></div>
        </div>

        <div class="verdict-section">
          <div class="verdict-pill ${change > 0 ? 'v-long' : 'v-short'}">${change > 0 ? 'BULLISH' : 'BEARISH'}</div>
          <div class="confidence-bar"><div class="conf-fill cf-high" style="width: 75%"></div></div>
          <div style="font-size: 11px; color: var(--text3);">Confidence: 75%</div>
        </div>

        <div style="font-size: 13px; line-height: 1.6; margin-bottom: 20px; color: var(--text2);">
          <p><strong>${p.name}</strong> is trading at $${fmt(q.c)}, ${change > 0 ? 'up' : 'down'} ${Math.abs(fmt(change))}% from the previous close.</p>
          <p>Industry: <strong>${p.finnhubIndustry || 'N/A'}</strong></p>
        </div>

        ${data.n.length > 0 ? `
          <div class="news-section">
            <h3 style="font-size: 14px; margin-bottom: 10px; color: var(--text);">Recent News</h3>
            ${data.n.slice(0, 3).map(item => `
              <div class="news-item">
                ${item.headline}
                <div style="font-size: 10px; color: var(--text4); margin-top: 4px;">${new Date(item.datetime * 1000).toLocaleDateString()}</div>
              </div>
            `).join('')}
          </div>
        ` : ''}
      </div>
    </div>
  `;

  document.getElementById('result').innerHTML = html;
});
</script>
</body>
</html>
