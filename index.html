body[unresolved] {opacity: 0; display: block; overflow: hidden; position: relative; } 
</style>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pro Ticker Analyzer</title>

<style>
:root {
  --bg: #080b0f;
  --bg2: #0d1117;
  --bg3: #161b22;
  --bg4: #1c2128;
  --border: #21262d;
  --border2: #30363d;
  --text: #e6edf3;
  --text2: #c9d1d9;
  --text3: #8b949e;
  --text4: #6e7681;
  --green: #1D9E75;
  --green2: #0f6e56;
  --green-bg: #1a3a2e;
  --green-border: #2d6a50;
  --red: #e24b4a;
  --red-bg: #2d1b1b;
  --red-border: #6b2c2c;
  --amber: #EF9F27;
  --amber-bg: #2d1f0a;
  --amber-border: #854F0B;
  --gold: #c9a227;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Background grid ─────────────────────────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(29,158,117,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(29,158,117,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ── Glow orbs ───────────────────────────────────────────────── */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  pointer-events: none;
  z-index: 0;
}
.orb1 { width: 600px; height: 600px; background: rgba(29,158,117,0.06); top: -200px; right: -200px; }
.orb2 { width: 400px; height: 400px; background: rgba(201,162,39,0.04); bottom: -100px; left: -100px; }

.wrap {
  position: relative;
  z-index: 1;
  max-width: 900px;
  margin: 0 auto;
  padding: 0 20px 60px;
}

/* ── Header ──────────────────────────────────────────────────── */
header {
  padding: 40px 0 32px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  margin-bottom: 36px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--green), var(--green2));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.logo-text h1 {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--text);
}
.logo-text p {
  font-size: 11px;
  color: var(--text4);
  font-family: 'Space Mono', monospace;
  letter-spacing: 0.08em;
  margin-top: 2px;
}
.header-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}
.live-badge {
  display: flex; align-items: center; gap: 6px;
  font-size: 10px; font-family: 'Space Mono', monospace;
  color: var(--green); letter-spacing: 0.1em;
}
.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
  animation: pulse 1.8s infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }
.api-status {
  font-size: 10px; color: var(--text4);
  font-family: 'Space Mono', monospace;
}

/* ── API Key bar ─────────────────────────────────────────────── */
.api-bar {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}
.api-bar label {
  font-size: 11px;
  font-family: 'Space Mono', monospace;
  color: var(--text4);
  letter-spacing: 0.06em;
  white-space: nowrap;
}
.api-bar input {
  flex: 1;
  background: var(--bg4);
  border: 1px solid var(--border2);
  border-radius: 7px;
  padding: 7px 12px;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.api-bar input:focus { border-color: var(--green); }
.api-bar input::placeholder { color: var(--text4); }
.api-bar a {
  font-size: 10px;
  color: var(--green);
  font-family: 'Space Mono', monospace;
  text-decoration: none;
  white-space: nowrap;
  opacity: 0.8;
}
.api-bar a:hover { opacity: 1; }

/* ── Input section ───────────────────────────────────────────── */
.input-section {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 20px;
}

.input-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  transition: border-color 0.2s;
}
.input-card:hover { border-color: var(--border2); }
.input-card.active { border-color: var(--green); }

.input-card-label {
  font-size: 9px;
  font-family: 'Space Mono', monospace;
  letter-spacing: 0.12em;
  color: var(--text4);
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 6px;
}
.input-card-label span { font-size: 14px; }

textarea {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--text);
  resize: none;
  outline: none;
  height: 100px;
  transition: border-color 0.15s;
  line-height: 1.6;
}
textarea:focus { border-color: var(--green); }
textarea::placeholder { color: var(--text4); }

/* ── Image upload ────────────────────────────────────────────── */
.upload-zone {
  border: 1px dashed var(--border2);
  border-radius: 8px;
  height: 100px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  background: var(--bg3);
}
.upload-zone:hover { border-color: var(--green); background: rgba(29,158,117,0.04); }
.upload-zone.dragover { border-color: var(--green); background: rgba(29,158,117,0.08); }
.upload-zone input[type="file"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.upload-icon { font-size: 24px; margin-bottom: 6px; }
.upload-text { font-size: 11px; color: var(--text3); text-align: center; }
.upload-sub { font-size: 10px; color: var(--text4); margin-top: 2px; font-family: 'Space Mono', monospace; }
.upload-preview {
  position: absolute; inset: 0;
  display: none; align-items: center; justify-content: center;
  background: var(--bg3);
}
.upload-preview img { max-height: 100%; max-width: 100%; object-fit: contain; border-radius: 6px; }
.upload-preview .clear-img {
  position: absolute; top: 6px; right: 6px;
  background: rgba(0,0,0,0.7); border: none; color: #fff;
  border-radius: 50%; width: 20px; height: 20px; font-size: 11px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}

/* ── Parsed preview ──────────────────────────────────────────── */
.parsed-row {
  display: none;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
  padding: 10px 14px;
  background: var(--green-bg);
  border: 1px solid var(--green-border);
  border-radius: 10px;
  flex-wrap: wrap;
}
.parsed-row.visible { display: flex; }
.parsed-tag {
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  padding: 2px 8px;
  border-radius: 5px;
  background: rgba(29,158,117,0.2);
  color: var(--green);
  border: 1px solid var(--green-border);
}
.parsed-label { font-size: 10px; color: var(--text3); font-family: 'Space Mono', monospace; }

/* ── Analyze button ──────────────────────────────────────────── */
.analyze-btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--green), var(--green2));
  border: none;
  border-radius: 12px;
  color: #fff;
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 32px;
  position: relative;
  overflow: hidden;
}
.analyze-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
  opacity: 0;
  transition: opacity 0.2s;
}
.analyze-btn:hover::after { opacity: 1; }
.analyze-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(29,158,117,0.3); }
.analyze-btn:disabled { background: var(--bg4); color: var(--text4); cursor: not-allowed; transform: none; box-shadow: none; }
.analyze-btn:disabled::after { display: none; }

/* ── Result card ─────────────────────────────────────────────── */
#result { margin-top: 8px; }

.result-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  animation: fadeUp 0.3s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

.result-hero {
  padding: 24px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}
.result-ticker-block { display: flex; flex-direction: column; gap: 4px; }
.result-ticker {
  font-size: 42px;
  font-weight: 800;
  letter-spacing: -0.02em;
  font-family: 'Space Mono', monospace;
  color: var(--text);
  line-height: 1;
}
.result-company { font-size: 13px; color: var(--text3); margin-top: 4px; }
.result-sector {
  font-size: 10px; font-family: 'Space Mono', monospace;
  color: var(--text4); letter-spacing: 0.06em;
}
.result-badges { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
.badge {
  font-size: 11px; font-weight: 700;
  padding: 4px 12px; border-radius: 20px;
  font-family: 'Space Mono', monospace; letter-spacing: 0.04em;
}
.badge-long { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.badge-short { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
.badge-time { background: var(--bg4); color: var(--text3); border: 1px solid var(--border2); }

.result-body {
  display: grid;
  grid-template-columns: 1fr 1fr;
}

.result-col {
  padding: 24px;
}
.result-col-left { border-right: 1px solid var(--border); }

.col-hdr {
  font-size: 9px; font-family: 'Space Mono', monospace;
  letter-spacing: 0.12em; color: var(--text4);
  text-transform: uppercase; margin-bottom: 16px;
}

/* Verdict */
.verdict-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.verdict-pill {
  font-size: 16px; font-weight: 800;
  padding: 6px 18px; border-radius: 30px;
  font-family: 'Space Mono', monospace; letter-spacing: 0.06em;
}
.v-long { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.v-short { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
.v-neutral { background: var(--bg4); color: var(--text3); border: 1px solid var(--border2); }
.v-avoid { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }

.conf-label { font-size: 11px; color: var(--text3); font-family: 'Space Mono', monospace; }
.conf-bar { height: 3px; border-radius: 2px; background: var(--bg4); margin-bottom: 14px; overflow: hidden; }
.conf-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease; }
.cf-high { background: var(--green); }
.cf-med { background: var(--amber); }
.cf-low { background: var(--red); }

.rationale {
  font-size: 13px; line-height: 1.7;
  color: var(--text2); font-family: 'Syne', sans-serif;
  margin-bottom: 14px;
}

.risks { display: flex; flex-wrap: wrap; gap: 5px; }
.risk-tag {
  font-size: 10px; padding: 2px 8px; border-radius: 5px;
  background: var(--amber-bg); color: var(--amber);
  border: 1px solid var(--amber-border);
  font-family: 'Space Mono', monospace;
}

/* Stats */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 0; }
.stat-cell {
  background: var(--bg2);
  padding: 10px 12px;
  display: flex; flex-direction: column; gap: 2px;
}
.stat-k { font-size: 9px; color: var(--text4); font-family: 'Space Mono', monospace; letter-spacing: 0.06em; }
.stat-v { font-size: 13px; font-family: 'Space Mono', monospace; color: var(--text); font-weight: 700; }
.stat-v.green { color: var(--green); }
.stat-v.red { color: var(--red); }

/* News */
.news-section {
  padding: 20px 24px;
  border-top: 1px solid var(--border);
}
.news-grid { display: flex; flex-direction: column; gap: 10px; }
.news-item {
  padding: 12px 14px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  transition: border-color 0.15s;
}
.news-item:hover { border-color: var(--border2); }
.news-hl { font-size: 13px; color: var(--text2); line-height: 1.5; margin-bottom: 6px; }
.news-meta { display: flex; align-items: center; gap: 8px; font-size: 10px; color: var(--text4); font-family: 'Space Mono', monospace; }
.news-sent {
  padding: 1px 7px; border-radius: 8px; font-size: 9px;
}
.ns-bull { background: var(--green-bg); color: var(--green); }
.ns-bear { background: var(--red-bg); color: var(--red); }
.ns-neut { background: var(--bg4); color: var(--text3); }

/* Disclaimer */
.disclaimer {
  padding: 14px 24px;
  border-top: 1px solid var(--border);
  font-size: 10px; color: var(--text4);
  font-family: 'Space Mono', monospace;
  text-align: center; line-height: 1.6;
}

/* Loading */
.loading-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 48px;
  text-align: center;
  animation: fadeUp 0.2s ease;
}
.loading-spinner {
  width: 40px; height: 40px;
  border: 2px solid var(--border2);
  border-top-color: var(--green);
  border-radius: 50%;
  margin: 0 auto 16px;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--text3); font-family: 'Space Mono', monospace; }
.loading-sub { font-size: 11px; color: var(--text4); margin-top: 6px; font-family: 'Space Mono', monospace; }

/* Error */
.error-card {
  background: var(--red-bg);
  border: 1px solid var(--red-border);
  border-radius: 16px;
  padding: 20px 24px;
  font-size: 13px; color: var(--red);
  font-family: 'Space Mono', monospace;
  line-height: 1.6;
}

/* History strip */
.history-strip {
  margin-bottom: 24px;
  display: none;
}
.history-strip.visible { display: block; }
.history-hdr {
  font-size: 9px; font-family: 'Space Mono', monospace;
  letter-spacing: 0.12em; color: var(--text4);
  text-transform: uppercase; margin-bottom: 10px;
}
.history-items { display: flex; gap: 8px; flex-wrap: wrap; }
.history-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Space Mono', monospace;
}
.history-chip:hover { border-color: var(--green); }
.history-chip.active { border-color: var(--green); background: var(--green-bg); }
.hc-ticker { font-size: 12px; font-weight: 700; color: var(--text); }
.hc-verdict { font-size: 9px; padding: 1px 6px; border-radius: 6px; }

/* Image detected banner */
.img-detected {
  display: none;
  align-items: center; gap: 8px;
  padding: 8px 14px;
  background: var(--amber-bg);
  border: 1px solid var(--amber-border);
  border-radius: 8px;
  margin-bottom: 12px;
  font-size: 11px; color: var(--amber);
  font-family: 'Space Mono', monospace;
}
.img-detected.visible { display: flex; }

/* Responsive */
@media (max-width: 640px) {
  .input-section { grid-template-columns: 1fr; }
  .result-body { grid-template-columns: 1fr; }
  .result-col-left { border-right: none; border-bottom: 1px solid var(--border); }
  .result-ticker { font-size: 32px; }
  .result-hero { flex-direction: column; }
  header { flex-direction: column; gap: 12px; }
  .api-bar { flex-wrap: wrap; }
}

/* ── Markdown card ─────────────────────────────────────────────── */
.md-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  animation: fadeUp 0.3s ease;
  margin-bottom: 16px;
}
.md-body {
  padding: 28px 32px;
  line-height: 1.8;
  color: var(--text2);
  font-size: 14px;
}
.md-body h1 {
  font-size: 28px;
  font-weight: 800;
  color: var(--text);
  margin: 0 0 12px;
  letter-spacing: -0.02em;
  font-family: 'Space Mono', monospace;
  border-bottom: 1px solid var(--border);
  padding-bottom: 12px;
}
.md-body h2 {
  font-size: 14px;
  font-weight: 700;
  color: var(--text3);
  margin: 24px 0 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-family: 'Space Mono', monospace;
  display: flex;
  align-items: center;
  gap: 8px;
}
/* Company overview section gets a subtle background highlight */
.md-body h2:first-of-type {
  color: var(--text);
  margin-top: 0;
}
.md-overview-block {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-left: 3px solid var(--green);
  border-radius: 0 8px 8px 0;
  padding: 14px 16px;
  margin: 0 0 20px;
  font-size: 13px;
  line-height: 1.7;
  color: var(--text2);
}
.md-overview-block strong { color: var(--text); }
.earnings-soon {
  display: inline-block;
  background: var(--amber-bg);
  border: 1px solid var(--amber-bd);
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 12px;
  color: var(--amber);
  font-family: 'Space Mono', monospace;
  margin-top: 8px;
}
.md-body h3 {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  margin: 16px 0 8px;
}
.md-body h4 {
  font-size: 13px;
  font-weight: 600;
  color: var(--text3);
  margin: 12px 0 6px;
  font-family: 'Space Mono', monospace;
}
.md-body p {
  margin: 0 0 12px;
  color: var(--text2);
}
.md-body strong {
  color: var(--text);
  font-weight: 700;
}
.md-body em { font-style: italic; color: var(--text3); }
.md-body code {
  background: var(--bg4);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 1px 6px;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--green);
}
.md-body ul {
  list-style: none;
  padding: 0;
  margin: 0 0 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.md-body li {
  padding: 6px 10px 6px 14px;
  border-left: 2px solid var(--border2);
  color: var(--text2);
  font-size: 13px;
  line-height: 1.6;
}
.md-body li strong { color: var(--green); }
.md-body hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 24px 0;
}
.md-body blockquote {
  border-left: 3px solid var(--green);
  background: var(--green-bg);
  padding: 10px 16px;
  border-radius: 0 8px 8px 0;
  margin: 12px 0;
  color: var(--text2);
  font-style: italic;
}
.md-body a {
  color: var(--green);
  text-decoration: none;
}
.md-body a:hover { text-decoration: underline; }

/* Tables */
.md-body table {
  width: 100%;
  border-collapse: collapse;
  margin: 12px 0;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
}
.md-body th {
  background: var(--bg3);
  color: var(--text3);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 8px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border2);
}
.md-body td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}
.md-body tr:last-child td { border-bottom: none; }
.md-body tr:hover td { background: var(--bg3); }

/* Color verdict pills inline */
.md-body strong:has-text("LONG") { color: var(--green); }

/* Verdict pill styling for **LONG** etc at top of card */
.md-body p:first-of-type strong:first-child {
  display: inline-block;
  padding: 3px 12px;
  border-radius: 20px;
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  letter-spacing: 0.05em;
}

</style>

  function extractSignals(text) {
    const results = [];
    const re = new RegExp(
      '\\$?([A-Z]{1,6})\\s+Long\\s*[>:]\\s*([\\d.]+)' +
      '(?:\\s+Short\\s*[<:]\\s*([\\d.]+))?' +
      '(?:\\s*[-\\u2013]\\s*([\\d]{1,2}:[\\d]{2}(?:\\s*[AP]M)?\\s*ET))?',
      'gi'
    );
    let m;
    while ((m = re.exec(text)) !== null) {
      const ticker = m[1].toUpperCase();
      if (ticker.length < 2) continue;
      results.push({
        raw: m[0].replace(/\s+/g, ' ').trim(),
        ticker,
        longPrice: parseFloat(m[2]),
        shortPrice: m[3] ? parseFloat(m[3]) : null,
        time: m[4] ? m[4].trim() : null
      });
    }
    return results;
  }

  // Rate limit state


  async function geminiCallWithRetry(_unused, body, attempt = 1) {
    // Enforce minimum gap between calls to avoid rate limits
    const now = Date.now();
    const wait = MIN_CALL_GAP_MS - (now - lastCallTime);
    if (wait > 0) {
      updateStatus(`Rate limit pause: ${Math.ceil(wait/1000)}s…`);
      await sleep(wait);
    }
    lastCallTime = Date.now();

    // Proxy through Cloudflare Worker — no API key in browser
    const resp = await fetch(
      WORKER_URL + '/gemini',
      { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) }
    );

    if (resp.status === 429) {
      if (attempt >= 3) throw new Error('Rate limit hit after 3 retries. Please wait 60 seconds and try again. Tip: the free Gemini tier allows ~15 requests/minute.');
      const waitSec = Math.max(parseInt(resp.headers.get('Retry-After') || '15'), 15);
      for (let s = waitSec; s > 0; s--) {
        updateStatus(`⏳ Rate limited — retrying in ${s}s… (attempt ${attempt}/3)`);
        await sleep(1000);
      }
      return geminiCallWithRetry(apiKey, body, attempt + 1);
    }

    if (!resp.ok) {
      const e = await resp.json().catch(() => ({}));
      const msg = e.error?.message || '';

      // Friendly quota/rate error
      if (resp.status === 429 || msg.includes('quota') || msg.includes('RESOURCE_EXHAUSTED')) {
        const retryMatch = msg.match(/retry in ([\d.]+)s/i);
        const waitSec = retryMatch ? Math.ceil(parseFloat(retryMatch[1])) : 60;

        // Check if it's a 2.0-flash quota issue (old cached file)
        if (msg.includes('gemini-2.0-flash')) {
          throw new Error(
            `Your browser loaded a cached version using the old gemini-2.0-flash model.

  ` +
            `Fix: Press Ctrl+Shift+R to hard-refresh the page, then try again.

  ` +
            `If the error persists, get a fresh free API key at aistudio.google.com/apikey`
          );
        }

        throw new Error(
          `Daily quota reached for this API key.

  ` +
          `Options:
  ` +
          `1. Wait ${waitSec > 3600 ? Math.ceil(waitSec/3600) + ' hour(s)' : waitSec + ' seconds'} for quota to reset
  ` +
          `2. Get a fresh free key at aistudio.google.com/apikey (takes 1 min)
  ` +
          `3. Each free key gives ~1,500 requests/day on gemini-2.5-flash`
        );
      }

      throw new Error(msg || `API error ${resp.status}`);
    }
    return resp.json();
  }

  function extractTextFromResponse(data) {
    const parts = data.candidates?.[0]?.content?.parts || [];
    const text = parts
      .filter(p => p.text && typeof p.text === 'string')
      .map(p => p.text)
      .join('\n');
    if (!text.trim()) throw new Error('Empty response from AI. Try again in a few seconds.');
    // Strip preamble before first # heading
    const firstH = text.indexOf('\n# ');
    if (firstH > 0) return text.slice(firstH).trim();
    if (text.trimStart().startsWith('# ')) return text.trimStart();
    return text.trim();
  }

  // Simple markdown → HTML renderer (no dependencies)
  function renderMarkdown(md) {
    var out = md;

    // Tables — line by line
    var lines = out.split('\n');
    var result = [];
    var tableBuf = [];
    for (var li = 0; li < lines.length; li++) {
      var ln = lines[li];
      if (ln.trim().charAt(0) === '|' && ln.trim().slice(-1) === '|') {
        tableBuf.push(ln);
      } else {
        if (tableBuf.length) {
          var thtml = '<table>';
          var isHead = true;
          for (var ti = 0; ti < tableBuf.length; ti++) {
            var row = tableBuf[ti];
            if (/^\|[\s\-:|]+\|/.test(row.trim())) {
              if (isHead) { thtml += '</thead><tbody>'; isHead = false; }
              continue;
            }
            var cells = row.split('|').filter(function(c){ return c.trim() !== ''; });
            var tag = isHead ? 'th' : 'td';
            thtml += '<tr>' + cells.map(function(c){ return '<'+tag+'>'+c.trim()+'</'+tag+'>'; }).join('') + '</tr>';
            if (isHead) { thtml += '</thead><tbody>'; isHead = false; }
          }
          thtml += '</tbody></table>';
          result.push(thtml);
          tableBuf = [];
        }
        result.push(ln);
      }
    }
    if (tableBuf.length) {
      var thtml2 = '<table><tbody>';
      for (var ti2 = 0; ti2 < tableBuf.length; ti2++) {
        var row2 = tableBuf[ti2];
        if (/^\|[\s\-:|]+\|/.test(row2.trim())) continue;
        var cells2 = row2.split('|').filter(function(c){ return c.trim() !== ''; });
        thtml2 += '<tr>' + cells2.map(function(c){ return '<td>'+c.trim()+'</td>'; }).join('') + '</tr>';
      }
      thtml2 += '</tbody></table>';
      result.push(thtml2);
    }
    out = result.join('\n');

    // Headers
    out = out.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
    out = out.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    out = out.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    out = out.replace(/^# (.+)$/gm, '<h1>$1</h1>');

    // Links BEFORE bold to protect URLs
    out = out.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener" style="color:var(--green);text-decoration:none">$1 &#8599;</a>');

    // Bold + italic
    out = out.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    out = out.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Highlight the 🔥 most influential news item with a special background
    out = out.replace(/<li>🔥 (<strong>[\s\S]*?<\/strong>)<\/li>/g,
      '<li style="background:rgba(29,158,117,0.08);border-left:3px solid var(--green);padding:8px 12px;border-radius:0 6px 6px 0;margin:4px 0">🔥 $1</li>'
    );
    out = out.replace(/\*(.+?)\*/g, '<em>$1</em>');

    // Inline code
    out = out.replace(/`([^`]+)`/g, '<code>$1</code>');

    // Horizontal rule
    out = out.replace(/^---+$/gm, '<hr>');

    // Blockquote
    out = out.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

    // Lists — collect <li> runs
    out = out.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
    out = out.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
    // Wrap consecutive li elements
    var liLines = out.split('\n');
    var liResult = [];
    var inList = false;
    for (var i = 0; i < liLines.length; i++) {
      if (liLines[i].trim().startsWith('<li>')) {
        if (!inList) { liResult.push('<ul>'); inList = true; }
        liResult.push(liLines[i]);
      } else {
        if (inList) { liResult.push('</ul>'); inList = false; }
        liResult.push(liLines[i]);
      }
    }
    if (inList) liResult.push('</ul>');
    out = liResult.join('\n');

    // Paragraphs — join double newlines
    out = out.split('\n\n').join('</p><p>');
    out = '<p>' + out + '</p>';
    out = out.split('\n').join('<br>');

    return out;
  }


  async function analyzeWithImage(apiKey, rawText, signals) {
    var today = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    var now = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',timeZoneName:'short'});

    var prompt = 'You are a senior Wall Street day trading analyst with live internet access. Today is '+today+', time is '+now+'.\n\n'
      +'CRITICAL RULES:\n'
      +'1. Start IMMEDIATELY with the first # heading — NO preamble or introduction sentences\n'
      +'2. Every news claim, catalyst, and risk factor MUST have a real working hyperlink [text](url)\n'
      +'3. Only use URLs you actually found via web search — never fabricate URLs\n\n'
      +'The user has uploaded a screenshot from the Pro Ticker Signals app (or WhatsApp/Telegram).\n'
      +(rawText ? 'They also provided text: "'+rawText.slice(0,300)+'"\n\n' : '\n')
      +'STEP 1: Extract ALL trade signals from the image. They look like:\n'
      +'  CLIK Long > 3.66 Short < 3.08 - 6:56 AM ET\n'
      +'  ODYS Long > 6.68 - 8:38 AM ET\n\n'
      +'STEP 2: For each ticker found, search the internet RIGHT NOW for news, catalysts, price data.\n\n'
      +'STEP 3: For EACH ticker produce EXACTLY this format:\n\n'
      +'# [TICKER] — [Full Company Name]\n'
      +'**[LONG / SHORT / NEUTRAL / AVOID]** | Confidence: [X]% | Long > $[price] | Short < $[price]\n\n'
      +'## 🏢 Company & Stock Overview\n'
      +'[2-3 sentences: What does this company do, what sector, how long public, primary revenue source.]\n\n'
      +'**Recent Performance:** [1-2 sentences on price trend last 1-3 months.]\n\n'
      +'**Earnings Watch:** [Search for next earnings date. If within 45 days, give projection with source link.]\n\n'
      +'## 📡 Catalyst Scan\n'
      +'[If article published within 30 min of signal, start with: ⚡ NEWS-DRIVEN CATALYST —]\n'
      +'[2-3 sentences with inline hyperlinks: "announced ([Source](url))"]\n\n'
      +'## 📰 Recent News\n'
      +'- **[Source]** — [Date] — [[Headline]](url). [1-2 sentence summary]\n\n'
      +'## 📊 Market Data\n'
      +'[Write: "Live data provided by Finnhub." — the table will be injected automatically]\n\n'
      +'## 🎯 Trade Analysis\n'
      +'[Para 1: Primary catalyst with inline link.]\n'
      +'[Para 2: Technical setup vs signal triggers, float, rel volume.]\n'
      +'[Para 3 ANALYST OPINION — write entirely in **bold**: "Based on [catalyst], the current price of $X.XX, and [specific data], **this analyst [recommends / does not recommend] entering a [long/short] position at this time because [reason]. Entry confirmed above $X.XX, invalidated below $X.XX.**"]\n\n'
      +'## ⚠️ Risk Factors\n'
      +'- **[Risk]**: [Description with numbers]. ([Source](url))\n\n'
      +'---\n'
      +'Repeat for EACH ticker found in the image.';

    // Fetch Finnhub data for any signals we already parsed from text
    var finnhubMap = {};
    if (FINNHUB_KEY && signals && signals.length && signals[0].ticker !== 'IMAGE') {
      var fhResults = await Promise.all(signals.map(function(s){ return getFinnhubData(s.ticker); }));
      signals.forEach(function(s,i){ finnhubMap[s.ticker] = fhResults[i]; });
    }

    var parts = [{ text: prompt }];
    if (currentImageBase64) {
      parts.push({ inline_data: { mime_type: currentImageMime||'image/jpeg', data: currentImageBase64 } });
    }

    var data = await geminiCallWithRetry(apiKey, {
      contents: [{ parts: parts }],
      tools: [{ google_search: {} }],
      generationConfig: { temperature: 0.1, maxOutputTokens: 8192 }
    });

    var markdown = extractTextFromResponse(data);

    // Try to extract tickers from the response to fetch Finnhub data
    if (FINNHUB_KEY && Object.keys(finnhubMap).length === 0) {
      var foundTickers = [];
      var hMatch;
      var hRe = /^# ([A-Z]{2,6})/gm;
      while ((hMatch = hRe.exec(markdown)) !== null) {
        foundTickers.push(hMatch[1]);
      }
      if (foundTickers.length) {
        var fhRes2 = await Promise.all(foundTickers.map(function(t){ return getFinnhubData(t); }));
        foundTickers.forEach(function(t,i){ finnhubMap[t] = fhRes2[i]; });
        // Build signal objects for history
        signals = foundTickers.map(function(t){ return { raw: t, ticker: t, longP: null, shortP: null, time: null }; });
      }
    }

    renderMarkdownResults(markdown, signals, finnhubMap);
  }

  async function analyzeSignals(apiKey, signals, rawText) {
    var today = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    var now = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',timeZoneName:'short'});
    var signalList = signals.map(function(s){return s.raw;}).join('\n');
    var tickerList = signals.map(function(s){return s.ticker;}).join(', ');

    // Fetch Finnhub data for all tickers in parallel
    var finnhubMap = {};
    if (FINNHUB_KEY) {
      var fhResults = await Promise.all(signals.map(function(s){return getFinnhubData(s.ticker);}));
      signals.forEach(function(s,i){ finnhubMap[s.ticker] = fhResults[i]; });
    }

    // Build live data context for prompt
    var liveCtx = signals.map(function(s){
      var d = finnhubMap[s.ticker];
      if (!d) return '';
      var earningsLine = d.nextEarningsDate
        ? 'Next Earnings: '+d.nextEarningsDate+' ('+d.daysToEarnings+' days away)'
          + (d.nextEarningsEpsEst ? ' | EPS Est: $'+d.nextEarningsEpsEst : '')
          + (d.nextEarningsRevEst ? ' | Rev Est: $'+(d.nextEarningsRevEst/1e6).toFixed(1)+'M' : '')
        : 'Next Earnings: Not found within 45 days';
      return s.ticker+' LIVE DATA (Finnhub):\n'
        +'Price: $'+d.price+' ('+d.change+') | Open: $'+d.open+' | High: $'+d.high+' | Low: $'+d.low+'\n'
        +'Volume: '+d.volume+' | Avg Vol (10d): '+d.avgVolume+' | Rel Volume: '+d.relVolume+'\n'
        +'Market Cap: '+d.marketCap+' | Float: '+d.float+' | Industry: '+d.industry+'\n'
        +'52W Range: $'+d.lo52+' — $'+d.hi52+' | Beta: '+d.beta+'\n'
        +earningsLine;
    }).filter(Boolean).join('\n\n');

    var prompt = 'You are a senior Wall Street day trading analyst with live internet access. Today is '+today+', current time is '+now+'.\n\n'
      +'CRITICAL RULES:\n'
      +'1. Start IMMEDIATELY with the first # heading — NO preamble or introduction\n'
      +'2. Every news claim, catalyst, and risk factor MUST have a real working hyperlink [text](url)\n'
      +'3. Only use URLs you actually found via web search — never fabricate URLs\n'
      +'4. Market data must state the exact date it is from\n\n'
      +'SIGNALS:\n'+signalList+'\n\n'
      +(rawText && rawText !== signalList ? 'CONTEXT: "'+rawText.slice(0,300)+'"\n\n' : '')
      +(liveCtx ? 'LIVE MARKET DATA FROM FINNHUB (use these exact numbers in your analysis):\n'+liveCtx+'\n\nIMPORTANT: The market table is auto-generated from Finnhub. In your ## 📡 Catalyst Scan and ## 🎯 Trade Analysis sections, also mention premarket high/low and premarket volume if you can find them via web search (e.g. search "[TICKER] premarket volume today"). These are not in Finnhub free tier.\n\n' : '')
      +'For EACH ticker ('+tickerList+'), produce EXACTLY this format:\n\n'
      +'# [TICKER] — [Full Company Name]\n'
      +'**[LONG / SHORT / NEUTRAL / AVOID]** | Confidence: [X]% | Long > $[price] | Short < $[price]\n\n'
      +'## 🏢 Company & Stock Overview\n'
      +'[2-3 sentences: What does this company actually do? What sector/industry? How long have they been public? What is their primary revenue source?]\n\n'
      +'**Recent Performance:** [1-2 sentences on how the stock has performed in the last 1-3 months — is it in an uptrend, downtrend, or ranging? Any major price events?]\n\n'
      +'**Earnings Watch:** [Search for the next earnings date. If earnings are within 45 days, state the exact date and write a projection: based on [analyst estimates/recent revenue trends/sector performance], this company is expected to [beat/meet/miss] earnings because [specific reason with source link]. If no upcoming earnings found, state that clearly.]\n\n'
      +'## 📡 Catalyst Scan\n'
      +'[If article published within 30 min of signal time, start with: ⚡ NEWS-DRIVEN CATALYST —]\n'
      +'[2-3 sentences on what was announced, when, and why it moves the stock. Every claim needs inline hyperlink: e.g. "announced ([Source Name](https://...))"]\n\n'
      +'## 📰 Recent News\n'
      +'List ALL relevant articles found, most recent first. Every single item MUST include:\n'
      +'  - Source name\n'
      +'  - Exact publication date AND TIME (e.g. "May 13, 2026 at 8:30 AM ET")\n'
      +'  - Headline as a clickable hyperlink to the real article URL\n'
      +'  - 1-2 sentence summary\n\n'
      +'For the SINGLE article most likely driving today\'s price action, wrap the entire bullet in **bold** with a 🔥 emoji prefix.\n\n'
      +'Format for most influential:\n'
      +'- 🔥 **[Source] — [Date at Time ET] — [[Headline](real_url)]. [Summary]**\n\n'
      +'Format for all others:\n'
      +'- **[Source]** — [Date at Time ET] — [[Headline](real_url)]. [Summary]\n\n'
      +'CRITICAL: The hyperlink syntax must be [text](url) — DO NOT skip the URL. Search the web to find the actual article URL.\n\n'
      +'## 📊 Market Data\n'
      +'[The live Finnhub table will be injected here automatically — just write a 1-line note: "Live data provided by Finnhub."]\n\n'
      +'## 🎯 Trade Analysis\n'
      +'[Para 1: Primary catalyst and why it moves the stock. Inline link to source.]\n'
      +'[Para 2: Technical setup — current price vs signal triggers, float, rel volume, momentum.]\n'
      +'[Para 3 ANALYST OPINION — write this entire paragraph in **bold**: "Based on [specific catalyst with link], the current price of $X.XX, and [specific data such as float/RVOL/short interest], **this analyst [recommends / does not recommend] entering a [long/short] position at this time because [specific reason]. Entry confirmed above $X.XX, invalidated below $X.XX.**"]\\n\\n'
      +'## ⚠️ Risk Factors\n'
      +'- **[Risk Name]**: [Specific description with numbers]. ([Source Name](real_url))\n'
      +'[Every risk needs a cited source with real URL]\n\n'
      +'---\n'
      +(signals.length > 1 ? 'Repeat FULL block for EACH ticker.\n' : '');

    var data = await geminiCallWithRetry(apiKey, {
      contents: [{ role: 'user', parts: [{ text: prompt }] }],
      tools: [{ google_search: {} }],
      generationConfig: { temperature: 0.1, maxOutputTokens: 8192 }
    });

    var markdown = extractTextFromResponse(data);
    renderMarkdownResults(markdown, signals, finnhubMap);
  }


  function showLoading(signals, hasImage, isImageOnly) {
    const ticker = signals[0]?.ticker !== 'IMAGE' ? signals[0]?.ticker : '';
    let subText;
    if (isImageOnly) subText = 'Extracting signals from screenshot…';
    else if (hasImage && signals.length > 0) subText = `Screenshot + ${signals.length} signal${signals.length>1?'s':''}`;
    else if (signals.length > 1) subText = `Scanning ${signals.length} tickers`;
    else subText = `Scanning news & market data for ${ticker}`;
    document.getElementById('result').innerHTML = `
      <div class="lcard">
        <div class="lspinner"></div>
        <div class="ltext">Searching the internet…</div>
        <div class="lsub">${subText}</div>
      </div>`;
  }

  function showError(msg) {
    document.getElementById('result').innerHTML = `<div class="ecard">⚠ ${msg}</div>`;
  }

  function renderMarkdownResults(markdown, signals, finnhubMap) {
    // Add to session signalHistory
    signals.forEach(s => {
      if (s.ticker !== 'IMAGE' && !signalHistory.find(h => h.ticker === s.ticker)) {
        signalHistory.unshift({ ticker: s.ticker, markdown: markdown, signals: signals, finnhubMap: finnhubMap||{} });
      }
    });
    // If image-only, try to extract tickers from markdown headings
    if (signals[0]?.ticker === 'IMAGE') {
      const found = [...markdown.matchAll(/^# ([A-Z]{2,6})/gm)].map(m => m[1]);
      found.forEach(t => {
        if (!signalHistory.find(h => h.ticker === t)) signalHistory.unshift({ ticker: t, markdown: markdown, signals: signals, finnhubMap: finnhubMap||{} });
      });
    }
    updateHistory();
    document.getElementById('result').innerHTML = buildMarkdownCard(markdown, finnhubMap);
  }

  function buildMarkdownCard(markdown, finnhubMap) {
    finnhubMap = finnhubMap || {};
    var sections = markdown.split(/(?=^# [A-Z])/m).filter(function(s){ return s.trim(); });
    if (!sections.length) sections = [markdown];

    return sections.map(function(section) {
      var verdictMatch = section.match(/\*\*(LONG|SHORT|NEUTRAL|AVOID)\*\*/);
      var verdict = verdictMatch ? verdictMatch[1] : null;
      var borderColor = verdict==='LONG'?'var(--green)':verdict==='SHORT'?'var(--red)':verdict==='AVOID'?'var(--amber)':'var(--border)';

      var tickerMatch = section.match(/^# ([A-Z]{1,6})/m);
      var ticker = tickerMatch ? tickerMatch[1] : null;
      var fd = ticker ? finnhubMap[ticker] : null;

      // Remove the placeholder Market Data line from Gemini output
      var cleanSection = (function(s) {
        var idx = s.indexOf('## ');
        while (idx !== -1) {
          var lineEnd = s.indexOf('\n', idx);
          var heading = lineEnd !== -1 ? s.slice(idx, lineEnd) : s.slice(idx);
          if (heading.indexOf('Market Data') !== -1) {
            var nextSection = s.indexOf('\n## ', idx + 4);
            var nextRule = s.indexOf('\n---', idx + 4);
            var nextH1 = s.indexOf('\n# ', idx + 4);
            var ends = [nextSection, nextRule, nextH1].filter(function(x){ return x !== -1; });
            var endPos = ends.length ? Math.min.apply(null, ends) : s.length;
            s = s.slice(0, idx) + s.slice(endPos);
            break;
          }
          idx = s.indexOf('## ', idx + 3);
        }
        return s;
      })(section)

      var renderedMd = renderMarkdown(cleanSection);
      var finnhubTable = fd ? buildFinnhubCard(fd, ticker) : '';
      var finnhubNews = fd && fd.news && fd.news.length ? buildFinnhubNews(fd) : '';

      // Wrap the Company Overview section in a styled block
      renderedMd = renderedMd.replace(
        /(<h2[^>]*>[^<]*(?:Company|Overview|Stock Overview)[^<]*<\/h2>)([\s\S]*?)(<h2|$)/,
        function(match, h2, body, next) {
          return h2 + '<div class="md-overview-block">' + body.trim() + '</div>' + next;
        }
      );

      // Inject live Finnhub table after the Catalyst Scan section
      var finalHtml = renderedMd.replace(
        /(<h2[^>]*>[^<]*Catalyst[^<]*<\/h2>)([\s\S]*?)(<h2|$)/,
        function(match, h2, body, next) { return h2 + body + finnhubTable + next; }
      );
      if (finnhubTable && finalHtml === renderedMd) {
        finalHtml = renderedMd + finnhubTable;
      }

      return '<div class="md-card" style="border-top:3px solid '+borderColor+';margin-bottom:16px">'
        + '<div class="md-body">' + finalHtml + finnhubNews + '</div>'
        + '</div>';
    }).join('');
  }
  function updateHistory() {
    const strip = document.getElementById('historyStrip');
    const items = document.getElementById('historyItems');
    if (!signalHistory.length) { strip.className = 'hist-strip'; return; }
    strip.className = 'hist-strip show';
    items.innerHTML = signalHistory.map((r, i) => {
      const m = r.markdown?.match(/\*\*(LONG|SHORT|NEUTRAL|AVOID)\*\*/);
      const verdict = m ? m[1] : '—';
      const vMap = { LONG:'vl', SHORT:'vs', NEUTRAL:'vn', AVOID:'va' };
      return `<div class="hchip ${i===0?'active':''}" onclick="showHistory(${i})">
        <span class="hcticker">${r.ticker}</span>
        <span class="hcv ${vMap[verdict]||'vn'}">${verdict}</span>
      </div>`;
    }).join('');
  }

  function showHistory(i) {
    const r = signalHistory[i];
    if (!r) return;
    document.getElementById('result').innerHTML = buildMarkdownCard(r.markdown, r.finnhubMap);
    document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
    document.querySelectorAll('.hchip').forEach((el, j) => el.classList.toggle('active', i === j));
  }

});
