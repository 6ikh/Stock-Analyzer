<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Ticker Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080b0f;
  --bg2: #0d1117;
  --bg3: #161b22;
  --bg4: #1c2128;
  --border: #21262d;
  --border2: #30363d;
  --text: #e6edf3;
  --text2: #c9d1d9;
  --text3: #8b949e;
  --text4: #6e7681;
  --green: #1D9E75;
  --green2: #0f6e56;
  --green-bg: #1a3a2e;
  --green-border: #2d6a50;
  --red: #e24b4a;
  --red-bg: #2d1b1b;
  --red-border: #6b2c2c;
  --amber: #EF9F27;
  --amber-bg: #2d1f0a;
  --amber-border: #854F0B;
  --gold: #c9a227;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Background grid ─────────────────────────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(29,158,117,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(29,158,117,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ── Glow orbs ───────────────────────────────────────────────── */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  pointer-events: none;
  z-index: 0;
}
.orb1 { width: 600px; height: 600px; background: rgba(29,158,117,0.06); top: -200px; right: -200px; }
.orb2 { width: 400px; height: 400px; background: rgba(201,162,39,0.04); bottom: -100px; left: -100px; }

.wrap {
  position: relative;
  z-index: 1;
  max-width: 900px;
  margin: 0 auto;
  padding: 0 20px 60px;
}

/* ── Header ──────────────────────────────────────────────────── */
header {
  padding: 40px 0 32px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  margin-bottom: 36px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--green), var(--green2));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.logo-text h1 {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--text);
}
.logo-text p {
  font-size: 11px;
  color: var(--text4);
  font-family: 'Space Mono', monospace;
  letter-spacing: 0.08em;
  margin-top: 2px;
}
.header-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}
.live-badge {
  display: flex; align-items: center; gap: 6px;
  font-size: 10px; font-family: 'Space Mono', monospace;
  color: var(--green); letter-spacing: 0.1em;
}
.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
  animation: pulse 1.8s infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }
.api-status {
  font-size: 10px; color: var(--text4);
  font-family: 'Space Mono', monospace;
}

/* ── API Key bar ─────────────────────────────────────────────── */
.api-bar {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}
.api-bar label {
  font-size: 11px;
  font-family: 'Space Mono', monospace;
  color: var(--text4);
  letter-spacing: 0.06em;
  white-space: nowrap;
}
.api-bar input {
  flex: 1;
  background: var(--bg4);
  border: 1px solid var(--border2);
  border-radius: 7px;
  padding: 7px 12px;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.api-bar input:focus { border-color: var(--green); }
.api-bar input::placeholder { color: var(--text4); }
.api-bar a {
  font-size: 10px;
  color: var(--green);
  font-family: 'Space Mono', monospace;
  text-decoration: none;
  white-space: nowrap;
  opacity: 0.8;
}
.api-bar a:hover { opacity: 1; }

/* ── Input section ───────────────────────────────────────────── */
.input-section {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 20px;
}

.input-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  transition: border-color 0.2s;
}
.input-card:hover { border-color: var(--border2); }
.input-card.active { border-color: var(--green); }

.input-card-label {
  font-size: 9px;
  font-family: 'Space Mono', monospace;
  letter-spacing: 0.12em;
  color: var(--text4);
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 6px;
}
.input-card-label span { font-size: 14px; }

textarea {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--text);
  resize: none;
  outline: none;
  height: 100px;
  transition: border-color 0.15s;
  line-height: 1.6;
}
textarea:focus { border-color: var(--green); }
textarea::placeholder { color: var(--text4); }

/* ── Image upload ────────────────────────────────────────────── */
.upload-zone {
  border: 1px dashed var(--border2);
  border-radius: 8px;
  height: 100px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  background: var(--bg3);
}
.upload-zone:hover { border-color: var(--green); background: rgba(29,158,117,0.04); }
.upload-zone.dragover { border-color: var(--green); background: rgba(29,158,117,0.08); }
.upload-zone input[type="file"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.upload-icon { font-size: 24px; margin-bottom: 6px; }
.upload-text { font-size: 11px; color: var(--text3); text-align: center; }
.upload-sub { font-size: 10px; color: var(--text4); margin-top: 2px; font-family: 'Space Mono', monospace; }
.upload-preview {
  position: absolute; inset: 0;
  display: none; align-items: center; justify-content: center;
  background: var(--bg3);
}
.upload-preview img { max-height: 100%; max-width: 100%; object-fit: contain; border-radius: 6px; }
.upload-preview .clear-img {
  position: absolute; top: 6px; right: 6px;
  background: rgba(0,0,0,0.7); border: none; color: #fff;
  border-radius: 50%; width: 20px; height: 20px; font-size: 11px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}

/* ── Parsed preview ──────────────────────────────────────────── */
.parsed-row {
  display: none;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
  padding: 10px 14px;
  background: var(--green-bg);
  border: 1px solid var(--green-border);
  border-radius: 10px;
  flex-wrap: wrap;
}
.parsed-row.visible { display: flex; }
.parsed-tag {
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  padding: 2px 8px;
  border-radius: 5px;
  background: rgba(29,158,117,0.2);
  color: var(--green);
  border: 1px solid var(--green-border);
}
.parsed-label { font-size: 10px; color: var(--text3); font-family: 'Space Mono', monospace; }

/* ── Analyze button ──────────────────────────────────────────── */
.analyze-btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--green), var(--green2));
  border: none;
  border-radius: 12px;
  color: #fff;
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 32px;
  position: relative;
  overflow: hidden;
}
.analyze-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
  opacity: 0;
  transition: opacity 0.2s;
}
.analyze-btn:hover::after { opacity: 1; }
.analyze-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(29,158,117,0.3); }
.analyze-btn:disabled { background: var(--bg4); color: var(--text4); cursor: not-allowed; transform: none; box-shadow: none; }
.analyze-btn:disabled::after { display: none; }

/* ── Result card ─────────────────────────────────────────────── */
#result { margin-top: 8px; }

.result-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  animation: fadeUp 0.3s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

.result-hero {
  padding: 24px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}
.result-ticker-block { display: flex; flex-direction: column; gap: 4px; }
.result-ticker {
  font-size: 42px;
  font-weight: 800;
  letter-spacing: -0.02em;
  font-family: 'Space Mono', monospace;
  color: var(--text);
  line-height: 1;
}
.result-company { font-size: 13px; color: var(--text3); margin-top: 4px; }
.result-sector {
  font-size: 10px; font-family: 'Space Mono', monospace;
  color: var(--text4); letter-spacing: 0.06em;
}
.result-badges { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
.badge {
  font-size: 11px; font-weight: 700;
  padding: 4px 12px; border-radius: 20px;
  font-family: 'Space Mono', monospace; letter-spacing: 0.04em;
}
.badge-long { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.badge-short { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
.badge-time { background: var(--bg4); color: var(--text3); border: 1px solid var(--border2); }

.result-body {
  display: grid;
  grid-template-columns: 1fr 1fr;
}

.result-col {
  padding: 24px;
}
.result-col-left { border-right: 1px solid var(--border); }

.col-hdr {
  font-size: 9px; font-family: 'Space Mono', monospace;
  letter-spacing: 0.12em; color: var(--text4);
  text-transform: uppercase; margin-bottom: 16px;
}

/* Verdict */
.verdict-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.verdict-pill {
  font-size: 16px; font-weight: 800;
  padding: 6px 18px; border-radius: 30px;
  font-family: 'Space Mono', monospace; letter-spacing: 0.06em;
}
.v-long { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.v-short { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
.v-neutral { background: var(--bg4); color: var(--text3); border: 1px solid var(--border2); }
.v-avoid { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }

.conf-label { font-size: 11px; color: var(--text3); font-family: 'Space Mono', monospace; }
.conf-bar { height: 3px; border-radius: 2px; background: var(--bg4); margin-bottom: 14px; overflow: hidden; }
.conf-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease; }
.cf-high { background: var(--green); }
.cf-med { background: var(--amber); }
.cf-low { background: var(--red); }

.rationale {
  font-size: 13px; line-height: 1.7;
  color: var(--text2); font-family: 'Syne', sans-serif;
  margin-bottom: 14px;
}

.risks { display: flex; flex-wrap: wrap; gap: 5px; }
.risk-tag {
  font-size: 10px; padding: 2px 8px; border-radius: 5px;
  background: var(--amber-bg); color: var(--amber);
  border: 1px solid var(--amber-border);
  font-family: 'Space Mono', monospace;
}

/* Stats */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 0; }
.stat-cell {
  background: var(--bg2);
  padding: 10px 12px;
  display: flex; flex-direction: column; gap: 2px;
}
.stat-k { font-size: 9px; color: var(--text4); font-family: 'Space Mono', monospace; letter-spacing: 0.06em; }
.stat-v { font-size: 13px; font-family: 'Space Mono', monospace; color: var(--text); font-weight: 700; }
.stat-v.green { color: var(--green); }
.stat-v.red { color: var(--red); }

/* News */
.news-section {
  padding: 20px 24px;
  border-top: 1px solid var(--border);
}
.news-grid { display: flex; flex-direction: column; gap: 10px; }
.news-item {
  padding: 12px 14px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  transition: border-color 0.15s;
}
.news-item:hover { border-color: var(--border2); }
.news-hl { font-size: 13px; color: var(--text2); line-height: 1.5; margin-bottom: 6px; }
.news-meta { display: flex; align-items: center; gap: 8px; font-size: 10px; color: var(--text4); font-family: 'Space Mono', monospace; }
.news-sent {
  padding: 1px 7px; border-radius: 8px; font-size: 9px;
}
.ns-bull { background: var(--green-bg); color: var(--green); }
.ns-bear { background: var(--red-bg); color: var(--red); }
.ns-neut { background: var(--bg4); color: var(--text3); }

/* Disclaimer */
.disclaimer {
  padding: 14px 24px;
  border-top: 1px solid var(--border);
  font-size: 10px; color: var(--text4);
  font-family: 'Space Mono', monospace;
  text-align: center; line-height: 1.6;
}

/* Loading */
.loading-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 48px;
  text-align: center;
  animation: fadeUp 0.2s ease;
}
.loading-spinner {
  width: 40px; height: 40px;
  border: 2px solid var(--border2);
  border-top-color: var(--green);
  border-radius: 50%;
  margin: 0 auto 16px;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--text3); font-family: 'Space Mono', monospace; }
.loading-sub { font-size: 11px; color: var(--text4); margin-top: 6px; font-family: 'Space Mono', monospace; }

/* Error */
.error-card {
  background: var(--red-bg);
  border: 1px solid var(--red-border);
  border-radius: 16px;
  padding: 20px 24px;
  font-size: 13px; color: var(--red);
  font-family: 'Space Mono', monospace;
  line-height: 1.6;
}

/* History strip */
.history-strip {
  margin-bottom: 24px;
  display: none;
}
.history-strip.visible { display: block; }
.history-hdr {
  font-size: 9px; font-family: 'Space Mono', monospace;
  letter-spacing: 0.12em; color: var(--text4);
  text-transform: uppercase; margin-bottom: 10px;
}
.history-items { display: flex; gap: 8px; flex-wrap: wrap; }
.history-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Space Mono', monospace;
}
.history-chip:hover { border-color: var(--green); }
.history-chip.active { border-color: var(--green); background: var(--green-bg); }
.hc-ticker { font-size: 12px; font-weight: 700; color: var(--text); }
.hc-verdict { font-size: 9px; padding: 1px 6px; border-radius: 6px; }

/* Image detected banner */
.img-detected {
  display: none;
  align-items: center; gap: 8px;
  padding: 8px 14px;
  background: var(--amber-bg);
  border: 1px solid var(--amber-border);
  border-radius: 8px;
  margin-bottom: 12px;
  font-size: 11px; color: var(--amber);
  font-family: 'Space Mono', monospace;
}
.img-detected.visible { display: flex; }

/* Responsive */
@media (max-width: 640px) {
  .input-section { grid-template-columns: 1fr; }
  .result-body { grid-template-columns: 1fr; }
  .result-col-left { border-right: none; border-bottom: 1px solid var(--border); }
  .result-ticker { font-size: 32px; }
  .result-hero { flex-direction: column; }
  header { flex-direction: column; gap: 12px; }
  .api-bar { flex-wrap: wrap; }
}

/* ── Markdown card ─────────────────────────────────────────────── */
.md-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  animation: fadeUp 0.3s ease;
  margin-bottom: 16px;
}
.md-body {
  padding: 28px 32px;
  line-height: 1.8;
  color: var(--text2);
  font-size: 14px;
}
.md-body h1 {
  font-size: 28px;
  font-weight: 800;
  color: var(--text);
  margin: 0 0 12px;
  letter-spacing: -0.02em;
  font-family: 'Space Mono', monospace;
  border-bottom: 1px solid var(--border);
  padding-bottom: 12px;
}
.md-body h2 {
  font-size: 14px;
  font-weight: 700;
  color: var(--text3);
  margin: 24px 0 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-family: 'Space Mono', monospace;
  display: flex;
  align-items: center;
  gap: 8px;
}
.md-body h3 {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  margin: 16px 0 8px;
}
.md-body h4 {
  font-size: 13px;
  font-weight: 600;
  color: var(--text3);
  margin: 12px 0 6px;
  font-family: 'Space Mono', monospace;
}
.md-body p {
  margin: 0 0 12px;
  color: var(--text2);
}
.md-body strong {
  color: var(--text);
  font-weight: 700;
}
.md-body em { font-style: italic; color: var(--text3); }
.md-body code {
  background: var(--bg4);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 1px 6px;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--green);
}
.md-body ul {
  list-style: none;
  padding: 0;
  margin: 0 0 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.md-body li {
  padding: 6px 10px 6px 14px;
  border-left: 2px solid var(--border2);
  color: var(--text2);
  font-size: 13px;
  line-height: 1.6;
}
.md-body li strong { color: var(--green); }
.md-body hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 24px 0;
}
.md-body blockquote {
  border-left: 3px solid var(--green);
  background: var(--green-bg);
  padding: 10px 16px;
  border-radius: 0 8px 8px 0;
  margin: 12px 0;
  color: var(--text2);
  font-style: italic;
}
.md-body a {
  color: var(--green);
  text-decoration: none;
}
.md-body a:hover { text-decoration: underline; }

/* Tables */
.md-body table {
  width: 100%;
  border-collapse: collapse;
  margin: 12px 0;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
}
.md-body th {
  background: var(--bg3);
  color: var(--text3);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 8px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border2);
}
.md-body td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}
.md-body tr:last-child td { border-bottom: none; }
.md-body tr:hover td { background: var(--bg3); }

/* Color verdict pills inline */
.md-body strong:has-text("LONG") { color: var(--green); }

/* Verdict pill styling for **LONG** etc at top of card */
.md-body p:first-of-type strong:first-child {
  display: inline-block;
  padding: 3px 12px;
  border-radius: 20px;
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  letter-spacing: 0.05em;
}

</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="wrap">
  <header>
    <div class="logo">
      <div class="logo-icon">📈</div>
      <div class="logo-text">
        <h1>Pro Ticker Analyzer</h1>
        <p>AI-POWERED SIGNAL INTELLIGENCE</p>
      </div>
    </div>
    <div class="header-right">
      <div class="live-badge"><div class="live-dot"></div> LIVE ANALYSIS</div>
      <div class="api-status" id="apiStatus">No key set</div>
    </div>
  </header>

  <!-- API Key -->
  <div class="api-bar">
    <label>GEMINI KEY</label>
    <input type="password" id="apiKey" placeholder="AIza... (free at aistudio.google.com/apikey)" />
    <a href="https://aistudio.google.com/apikey" target="_blank">Get free key ↗</a>
  </div>

  <!-- History -->
  <div class="history-strip" id="historyStrip">
    <div class="history-hdr">Today's Signals</div>
    <div class="history-items" id="historyItems"></div>
  </div>

  <!-- Inputs -->
  <div class="input-section">
    <div class="input-card" id="textCard">
      <div class="input-card-label"><span>✏️</span> Paste Signal or Text</div>
      <textarea id="signalInput" placeholder="Paste anything from the app, WhatsApp, or Telegram:

✅ CLIK Long > 3.66 Short < 3.08 - 6:56 AM ET
✅ MEHA Long > 0.186 Short < 0.09 - 08:18 AM ET
✅ ODYS Long > 6.68 - 8:38 AM ET

Or just a ticker: NVDA"></textarea>
    </div>

    <div class="input-card" id="imgCard">
      <div class="input-card-label"><span>📱</span> Upload App Screenshot</div>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="image/*" />
        <div class="upload-icon">📷</div>
        <div class="upload-text">Drop screenshot here</div>
        <div class="upload-sub">or click to browse</div>
        <div class="upload-preview" id="uploadPreview">
          <img id="previewImg" src="" alt="preview" />
          <button class="clear-img" id="clearImg">✕</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Parsed preview -->
  <div class="img-detected" id="imgDetected">
    <span>📷</span> <span id="imgDetectedText">Image attached — Claude will extract signals from the screenshot</span>
  </div>
  <div class="parsed-row" id="parsedRow"></div>

  <button class="analyze-btn" id="analyzeBtn">Analyze Signal →</button>

  <div id="result"></div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────
let signalHistory = []; // [{parsed, result}]
let currentImageBase64 = null;
let currentImageMime = null;
const SIGNAL_REGEX = new RegExp(
  '\\$?([A-Z]{1,6})\\s+Long\\s*[>:]\\s*([\\d.]+)' +
  '(?:\\s+Short\\s*[<:]\\s*([\\d.]+))?' +
  '(?:\\s*[-\\u2013]\\s*([\\d]{1,2}:[\\d]{2}(?:\\s*[AP]M)?\\s*ET))?',
  'gi'
);

// ── API Key persistence ────────────────────────────────────────
const keyInput = document.getElementById('apiKey');
const saved = localStorage.getItem('pta_gemini_key');
if (saved) { keyInput.value = saved; updateApiStatus(true); }
keyInput.addEventListener('input', () => {
  localStorage.setItem('pta_gemini_key', keyInput.value.trim());
  updateApiStatus(!!keyInput.value.trim());
});
function updateApiStatus(ok) {
  const el = document.getElementById('apiStatus');
  el.textContent = ok ? '✓ Key saved' : 'No key set';
  el.style.color = ok ? 'var(--green)' : 'var(--text4)';
}

// ── Signal parsing ─────────────────────────────────────────────
function extractSignals(text) {
  const results = [];
  const re = new RegExp(
    '\\$?([A-Z]{1,6})\\s+Long\\s*[>:]\\s*([\\d.]+)' +
    '(?:\\s+Short\\s*[<:]\\s*([\\d.]+))?' +
    '(?:\\s*[-\\u2013]\\s*([\\d]{1,2}:[\\d]{2}(?:\\s*[AP]M)?\\s*ET))?',
    'gi'
  );
  let m;
  while ((m = re.exec(text)) !== null) {
    const ticker = m[1].toUpperCase();
    if (ticker.length < 2) continue;
    results.push({
      raw: m[0].replace(/\s+/g, ' ').trim(),
      ticker,
      longPrice: parseFloat(m[2]),
      shortPrice: m[3] ? parseFloat(m[3]) : null,
      time: m[4] ? m[4].trim() : null
    });
  }
  return results;
}

// ── Input listeners ────────────────────────────────────────────
const signalInput = document.getElementById('signalInput');
signalInput.addEventListener('input', updateParsedPreview);

function updateParsedPreview() {
  const text = signalInput.value.trim();
  const signals = extractSignals(text);
  const row = document.getElementById('parsedRow');
  if (signals.length === 0 && !currentImageBase64) { row.className = 'parsed-row'; return; }
  if (signals.length === 0) return;
  row.className = 'parsed-row visible';
  row.innerHTML = signals.map(s =>
    `<span class="parsed-tag">${s.ticker}</span>
     <span class="parsed-label">L&gt;${s.longPrice}${s.shortPrice ? ' S&lt;'+s.shortPrice : ' (long only)'}${s.time ? ' · '+s.time : ''}</span>
     <span style="color:var(--border2);font-size:10px">|</span>`
  ).join('').replace(/\|$/, '');
}

// ── Image upload ───────────────────────────────────────────────
const fileInput = document.getElementById('fileInput');
const uploadPreview = document.getElementById('uploadPreview');
const previewImg = document.getElementById('previewImg');
const uploadZone = document.getElementById('uploadZone');
const imgDetected = document.getElementById('imgDetected');

fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
document.getElementById('clearImg').addEventListener('click', (e) => {
  e.stopPropagation();
  clearImage();
});

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  handleFile(e.dataTransfer.files[0]);
});

// Paste image from clipboard
document.addEventListener('paste', e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      handleFile(item.getAsFile());
      break;
    }
  }
});

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  currentImageMime = file.type;
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    currentImageBase64 = dataUrl.split(',')[1];
    previewImg.src = dataUrl;
    uploadPreview.style.display = 'flex';
    imgDetected.className = 'img-detected visible';
    document.getElementById('imgDetectedText').textContent = `Screenshot attached (${file.name || 'image'}) — AI will extract signals from it`;
    document.getElementById('parsedRow').className = 'parsed-row visible';
    document.getElementById('parsedRow').innerHTML = '<span class="parsed-label" style="color:var(--amber)">📷 Signals will be extracted from image by AI</span>';
  };
  reader.readAsDataURL(file);
}

function clearImage() {
  currentImageBase64 = null;
  currentImageMime = null;
  previewImg.src = '';
  uploadPreview.style.display = 'none';
  fileInput.value = '';
  imgDetected.className = 'img-detected';
  updateParsedPreview();
}

// ── Analyze ────────────────────────────────────────────────────
// ── Main entry point ──────────────────────────────────────────────────────
let lastCallTime = 0;
const MIN_CALL_GAP_MS = 8000;

async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function updateStatus(msg) {
  const el = document.querySelector('#result .loading-sub');
  if (el) el.textContent = msg;
}

async function runAnalysis() {
  const apiKey = keyInput.value.trim();
  if (!apiKey) {
    showError('Please enter your free Gemini API key above. Get one at aistudio.google.com/apikey');
    return;
  }

  const rawText = signalInput.value.trim();
  const hasImage = !!currentImageBase64;

  if (!rawText && !hasImage) {
    showError('Please paste a signal, ticker, or upload a screenshot.');
    return;
  }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.textContent = 'Analyzing…';

  // Parse full signals OR treat raw text as a plain ticker list
  let signals = rawText ? extractSignals(rawText) : [];

  // If text was entered but no Long/Short signals found, treat each word as a ticker
  if (rawText && signals.length === 0 && !hasImage) {
    const tickers = rawText.toUpperCase().match(/\b[A-Z]{1,6}\b/g) || [];
    signals = tickers
      .filter(t => t.length >= 2)
      .slice(0, 5) // max 5 tickers at once
      .map(t => ({ raw: t, ticker: t, longPrice: null, shortPrice: null, time: null }));
  }

  // Image-only with no text signals
  if (hasImage && signals.length === 0) {
    signals = [{ raw: '[from image]', ticker: 'IMAGE', longPrice: null, shortPrice: null, time: null }];
  }

  if (signals.length === 0) {
    showError('Could not find any tickers. Try: "NVDA" or "ODYS Long > 6.68"');
    btn.disabled = false; btn.textContent = 'Analyze Signal →';
    return;
  }

  // Show correct loading message
  const isImageOnly = signals.length === 1 && signals[0].ticker === 'IMAGE';
  showLoading(signals, hasImage, isImageOnly);

  try {
    if (hasImage) {
      await analyzeWithImage(apiKey, rawText, signals);
    } else {
      await analyzeSignals(apiKey, signals, rawText);
    }
  } catch(err) {
    showError(err.message);
  }

  btn.disabled = false;
  btn.textContent = 'Analyze Signal →';
}

document.getElementById('analyzeBtn').addEventListener('click', runAnalysis);
document.addEventListener('keydown', e => { if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') runAnalysis(); });

// Rate limit state


async function geminiCallWithRetry(apiKey, body, attempt = 1) {
  // Enforce minimum gap between calls to avoid rate limits
  const now = Date.now();
  const wait = MIN_CALL_GAP_MS - (now - lastCallTime);
  if (wait > 0) {
    updateStatus(`Rate limit pause: ${Math.ceil(wait/1000)}s…`);
    await sleep(wait);
  }
  lastCallTime = Date.now();

  const resp = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
    { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) }
  );

  if (resp.status === 429) {
    if (attempt >= 3) throw new Error('Rate limit hit after 3 retries. Please wait 60 seconds and try again. Tip: the free Gemini tier allows ~15 requests/minute.');
    const waitSec = Math.max(parseInt(resp.headers.get('Retry-After') || '15'), 15);
    for (let s = waitSec; s > 0; s--) {
      updateStatus(`⏳ Rate limited — retrying in ${s}s… (attempt ${attempt}/3)`);
      await sleep(1000);
    }
    return geminiCallWithRetry(apiKey, body, attempt + 1);
  }

  if (!resp.ok) {
    const e = await resp.json().catch(() => ({}));
    const msg = e.error?.message || '';

    // Friendly quota/rate error
    if (resp.status === 429 || msg.includes('quota') || msg.includes('RESOURCE_EXHAUSTED')) {
      const retryMatch = msg.match(/retry in ([\d.]+)s/i);
      const waitSec = retryMatch ? Math.ceil(parseFloat(retryMatch[1])) : 60;

      // Check if it's a 2.0-flash quota issue (old cached file)
      if (msg.includes('gemini-2.0-flash')) {
        throw new Error(
          `Your browser loaded a cached version using the old gemini-2.0-flash model.

` +
          `Fix: Press Ctrl+Shift+R to hard-refresh the page, then try again.

` +
          `If the error persists, get a fresh free API key at aistudio.google.com/apikey`
        );
      }

      throw new Error(
        `Daily quota reached for this API key.

` +
        `Options:
` +
        `1. Wait ${waitSec > 3600 ? Math.ceil(waitSec/3600) + ' hour(s)' : waitSec + ' seconds'} for quota to reset
` +
        `2. Get a fresh free key at aistudio.google.com/apikey (takes 1 min)
` +
        `3. Each free key gives ~1,500 requests/day on gemini-2.5-flash`
      );
    }

    throw new Error(msg || `API error ${resp.status}`);
  }
  return resp.json();
}

function extractTextFromResponse(data) {
  // Just grab all text parts — no JSON parsing needed
  const parts = data.candidates?.[0]?.content?.parts || [];
  const text = parts
    .filter(p => p.text && typeof p.text === 'string')
    .map(p => p.text)
    .join('\n');
  if (!text.trim()) throw new Error('Empty response from AI. Try again in a few seconds.');
  return text.trim();
}

// Simple markdown → HTML renderer (no dependencies)
function renderMarkdown(md) {
  var out = md;

  // Tables — process before other replacements
  out = out.replace(/(\|.+\|\n)+/g, function(tableBlock) {
    var rows = tableBlock.trim().split('\n');
    var html = '<table>';
    var isFirst = true;
    rows.forEach(function(row) {
      // Skip separator rows like |---|---|
      if (/^\|[\s\-:]+\|/.test(row)) {
        if (isFirst) { html += '</thead><tbody>'; isFirst = false; }
        return;
      }
      var cells = row.split('|').filter(function(c) { return c.trim() !== ''; });
      var tag = isFirst ? 'th' : 'td';
      html += '<tr>' + cells.map(function(c) {
        return '<' + tag + '>' + c.trim() + '</' + tag + '>';
      }).join('') + '</tr>';
      if (isFirst) html += '</thead><tbody>';
      isFirst = false;
    });
    html += '</tbody></table>';
    return html;
  });

  // Headers
  out = out.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  out = out.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  out = out.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  out = out.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Bold + italic
  out = out.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  out = out.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  out = out.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Inline code — avoid backtick conflicts by using a placeholder
  out = out.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Horizontal rule
  out = out.replace(/^---+$/gm, '<hr>');

  // Blockquote
  out = out.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

  // Lists — unordered
  out = out.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
  out = out.replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>');
  out = out.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, function(m) { return '<ul>' + m + '</ul>'; });

  // Links
  out = out.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Paragraphs
  out = out.replace(/\n\n/g, '</p><p>');
  out = '<p>' + out + '</p>';
  out = out.replace(/\n/g, '<br>');

  return out;
}


async function analyzeWithImage(apiKey, rawText, signals) {
  const today = new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

The user has uploaded a screenshot from the Pro Ticker Signals app.

  const parts = [{ text: prompt }];
  if (currentImageBase64) {

    generationConfig: { temperature: 0.1, maxOutputTokens: 4000 }
  });

  const markdown = extractTextFromResponse(data);
  renderMarkdownResults(markdown, signals);
}


async function analyzeSignals(apiKey, signals, rawText) {
  const today = new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  const now = new Date().toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', timeZoneName:'short' });

  const signalList = signals.map(s => s.raw).join('\n');
  const tickerList = signals.map(s => s.ticker).join(', ');

  const prompt = `You are a senior Wall Street day trading analyst with real-time internet access. Today is ${today}, current time is ${now}.

SIGNALS TO ANALYZE:
${signalList}

${rawText && rawText !== signalList ? 'FULL MESSAGE CONTEXT: "' + rawText.slice(0,400) + '"' : ''}

For EACH ticker (${tickerList}), search the internet RIGHT NOW:
1. Search "[TICKER] news today", "[TICKER] press release", "[TICKER] SEC filing", "[TICKER] earnings announcement"
2. Find ANY article published in the last 24-72 hours — especially from GlobeNewsWire, PR Newswire, SEC EDGAR, Bloomberg, Reuters
3. Check if news timing matches signal timing (e.g. article at 8:30 AM → signal at 8:38 AM = news-driven catalyst)

Write your full analysis in clean markdown. For EACH ticker:

## 📰 Recent News
- **[Source] — [time ago]** — [Headline]. [1-2 sentence summary of what the article says]

## 📊 Market Data
| Metric | Value |

## 🎯 Trade Analysis

## ⚠️ Risk Factors
- [Specific risk 1]
- [Specific risk 2]

---

${signals.length > 1 ? 'Repeat the full analysis block for EACH ticker above.' : ''}

Be thorough. The most valuable output is finding news that explains WHY the signal was sent.`;

  const data = await geminiCallWithRetry(apiKey, {
    contents: [{ role: 'user', parts: [{ text: prompt }] }],
    tools: [{ google_search: {} }],
    generationConfig: { temperature: 0.1, maxOutputTokens: 4000 }
  });

  const markdown = extractTextFromResponse(data);

}


function showLoading(signals, hasImage, isImageOnly) {
  const ticker = signals[0]?.ticker !== 'IMAGE' ? signals[0]?.ticker : '';
  let subText;
  if (isImageOnly) subText = 'Extracting signals from screenshot…';
  else if (hasImage && signals.length > 0) subText = `Screenshot + ${signals.length} signal${signals.length>1?'s':''}`;
  else if (signals.length > 1) subText = `Scanning ${signals.length} tickers`;
  else subText = `Scanning news & market data for ${ticker}`;
  document.getElementById('result').innerHTML = `
    <div class="lcard">
      <div class="lspinner"></div>
      <div class="ltext">Searching the internet…</div>
      <div class="lsub">${subText}</div>
    </div>`;
}

function showError(msg) {
  document.getElementById('result').innerHTML = `<div class="ecard">⚠ ${msg}</div>`;
}

function renderMarkdownResults(markdown, signals) {
  // Add to session signalHistory
  signals.forEach(s => {
    if (s.ticker !== 'IMAGE' && !signalHistory.find(h => h.ticker === s.ticker)) {
      signalHistory.unshift({ ticker: s.ticker, markdown, signals });
    }
  });
  // If image-only, try to extract tickers from markdown headings
  if (signals[0]?.ticker === 'IMAGE') {
    const found = [...markdown.matchAll(/^# ([A-Z]{2,6})/gm)].map(m => m[1]);
    found.forEach(t => {
      if (!signalHistory.find(h => h.ticker === t)) signalHistory.unshift({ ticker: t, markdown, signals });
    });
  }
  updateHistory();
  document.getElementById('result').innerHTML = buildMarkdownCard(markdown);
}

function buildMarkdownCard(markdown) {
  // Split on ticker sections (# TICKER heading) if multiple
  const sections = markdown.split(/(?=^# [A-Z])/m).filter(s => s.trim());

  const cardsHtml = sections.map(section => {
    // Extract verdict for border color
    const verdictMatch = section.match(/\*\*(LONG|SHORT|NEUTRAL|AVOID)\*\*/);
    const verdict = verdictMatch ? verdictMatch[1] : null;
    const borderColor = verdict === 'LONG' ? 'var(--green)' : verdict === 'SHORT' ? 'var(--red)' :
      verdict === 'AVOID' ? 'var(--amber)' : 'var(--border)';

    return `<div class="md-card" style="border-top: 3px solid ${borderColor}">
      <div class="md-body">${renderMarkdown(section)}</div>
    </div>`;
  }).join('');

  return cardsHtml || `<div class="md-card"><div class="md-body">${renderMarkdown(markdown)}</div></div>`;
}
function updateHistory() {
  const strip = document.getElementById('historyStrip');
  const items = document.getElementById('historyItems');
  if (!signalHistory.length) { strip.className = 'hist-strip'; return; }
  strip.className = 'hist-strip show';
  items.innerHTML = signalHistory.map((r, i) => {
    const m = r.markdown?.match(/\*\*(LONG|SHORT|NEUTRAL|AVOID)\*\*/);
    const verdict = m ? m[1] : '—';
    const vMap = { LONG:'vl', SHORT:'vs', NEUTRAL:'vn', AVOID:'va' };
    return `<div class="hchip ${i===0?'active':''}" onclick="showHistory(${i})">
      <span class="hcticker">${r.ticker}</span>
      <span class="hcv ${vMap[verdict]||'vn'}">${verdict}</span>
    </div>`;
  }).join('');
}

function showHistory(i) {
  const r = signalHistory[i];
  if (!r) return;
  document.getElementById('result').innerHTML = buildMarkdownCard(r.markdown);
  document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
  document.querySelectorAll('.hchip').forEach((el, j) => el.classList.toggle('active', i === j));
}
</script>
